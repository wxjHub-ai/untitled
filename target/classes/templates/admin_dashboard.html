<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/admin_layout :: layout(~{::title}, ~{::div})">
<head>
    <title>仪表盘 - 管理后台</title>
</head>
<body>
<div>
    <h2 class="mb-4">仪表盘概览</h2>
    
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card card-stat bg-white p-4 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted">总营业额</h6>
                        <h2 class="fw-bold mb-0 text-danger" th:text="'￥' + ${totalRevenue}">￥0.00</h2>
                    </div>
                    <div class="bg-light rounded-circle p-3">
                        <i class="fas fa-coins text-danger fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-stat bg-white p-4 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted">总订单数</h6>
                        <h2 class="fw-bold mb-0" th:text="${orderCount}">0</h2>
                    </div>
                    <div class="bg-light rounded-circle p-3">
                        <i class="fas fa-shopping-bag text-primary fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-stat bg-white p-4 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted">商品总数</h6>
                        <h2 class="fw-bold mb-0" th:text="${productCount}">0</h2>
                    </div>
                    <div class="bg-light rounded-circle p-3">
                        <i class="fas fa-box text-success fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3" sec:authorize="hasRole('ADMIN')">
            <div class="card card-stat bg-white p-4 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted">注册用户</h6>
                        <h2 class="fw-bold mb-0" th:text="${userCount}">0</h2>
                    </div>
                    <div class="bg-light rounded-circle p-3">
                        <i class="fas fa-users text-warning fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-5 bg-white p-4 rounded shadow-sm">
        <h5 class="fw-bold mb-3"><i class="fas fa-bolt text-warning me-2"></i> 快速操作</h5>
        <div class="d-flex flex-wrap gap-3">
            <a href="/admin/products/add" class="btn btn-primary px-4 rounded-pill">
                <i class="fas fa-plus me-1"></i> 添加新商品
            </a>
            <a href="/admin/orders" class="btn btn-success px-4 rounded-pill">
                <i class="fas fa-shopping-cart me-1"></i> 订单管理
            </a>
            <a href="/admin/users" class="btn btn-info text-white px-4 rounded-pill" sec:authorize="hasRole('ADMIN')">
                <i class="fas fa-users me-1"></i> 用户管理
            </a>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-4">营收趋势图</h5>
                    <canvas id="revenueChart" style="width: 100%; height: 400px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-4">订单数量趋势</h5>
                    <canvas id="orderTrendChart" style="width: 100%; height: 300px;"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-4">每日商品销量 (件)</h5>
                    <canvas id="productCountChart" style="width: 100%; height: 300px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        // Revenue Chart
        const labels = /*[[${chartLabels}]]*/ [];
        const data = /*[[${chartData}]]*/ [];

        const ctx = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '每日营收 (￥)',
                    data: data,
                    borderColor: 'rgb(75, 192, 192)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    tension: 0.1,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Order Trend Chart
        const orderLabels = /*[[${orderTrendLabels}]]*/ [];
        const orderData = /*[[${orderTrendData}]]*/ [];
        const ctxOrder = document.getElementById('orderTrendChart').getContext('2d');
        new Chart(ctxOrder, {
            type: 'line',
            data: {
                labels: orderLabels,
                datasets: [{
                    label: '订单量',
                    data: orderData,
                    borderColor: 'rgb(255, 99, 132)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    tension: 0.1,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });

        // Product Count Chart
        const productLabels = /*[[${productCountLabels}]]*/ [];
        const productData = /*[[${productCountData}]]*/ [];
        const ctxProduct = document.getElementById('productCountChart').getContext('2d');
        new Chart(ctxProduct, {
            type: 'bar',
            data: {
                labels: productLabels,
                datasets: [{
                    label: '销量',
                    data: productData,
                    backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    borderColor: 'rgb(54, 162, 235)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
        /*]]>*/
    </script>
</div>
</body>
</html>
