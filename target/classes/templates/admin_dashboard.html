<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/admin_layout :: layout(~{::title}, ~{::div})">
<head>
    <title>仪表盘 - 管理后台</title>
</head>
<body>
<div>
    <h2 class="mb-4">仪表盘概览</h2>
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card card-stat bg-white p-4 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted">总营业额</h6>
                        <h2 class="fw-bold mb-0 text-danger" th:text="'￥' + ${totalRevenue}">￥0.00</h2>
                    </div>
                    <div class="bg-light rounded-circle p-3">
                        <i class="fas fa-coins text-danger fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-stat bg-white p-4 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted">总订单数</h6>
                        <h2 class="fw-bold mb-0" th:text="${orderCount}">0</h2>
                    </div>
                    <div class="bg-light rounded-circle p-3">
                        <i class="fas fa-shopping-bag text-primary fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-stat bg-white p-4 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted">商品总数</h6>
                        <h2 class="fw-bold mb-0" th:text="${productCount}">0</h2>
                    </div>
                    <div class="bg-light rounded-circle p-3">
                        <i class="fas fa-box text-success fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-stat bg-white p-4 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted">注册用户</h6>
                        <h2 class="fw-bold mb-0" th:text="${userCount}">0</h2>
                    </div>
                    <div class="bg-light rounded-circle p-3">
                        <i class="fas fa-users text-warning fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-5">
        <h4>快速操作</h4>
        <div class="d-flex flex-wrap gap-2 mt-2">
            <a href="/admin/products/add" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i> 添加新商品
            </a>
            <a href="/admin/orders" class="btn btn-success">
                <i class="fas fa-shopping-cart me-1"></i> 订单管理
            </a>
            <a href="/admin/users" class="btn btn-info text-white">
                <i class="fas fa-users me-1"></i> 用户管理
            </a>
        </div>
    </div>
</div>
</body>
</html>
