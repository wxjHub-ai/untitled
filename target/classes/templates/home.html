<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title>首页 - 零食商城</title>
</head>
<body>
<section>
    <!-- 登录成功提示 -->
    <div th:if="${param.loginSuccess}" class="container mt-3">
        <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-check-circle me-2"></i> <strong>登录成功！</strong> 欢迎回来，<span sec:authentication="name"></span>。
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="container-fluid py-5 mb-5" style="background: linear-gradient(135deg, #FFE66D 0%, #FF6B6B 100%); color: white; border-radius: 0 0 50px 50px;">
        <div class="container py-5">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h1 class="display-4 fw-bold mb-3">美味零食，触手可及</h1>
                    <p class="lead mb-4">精选全球好味，极速送达。满足你挑剔的味蕾，尽在零食商城。</p>
                    <a href="#products" class="btn btn-light btn-lg text-danger rounded-pill px-5 fw-bold shadow">立即抢购</a>
                </div>
                <div class="col-lg-6 text-center d-none d-lg-block">
                    <!-- Placeholder for a hero image if we had one -->
                    <i class="fas fa-cookie-bite" style="font-size: 15rem; opacity: 0.8;"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Products Section -->
    <div class="container mb-5" id="products">
        
        <!-- 搜索和分类过滤 -->
        <div class="card border-0 shadow-sm rounded-pill p-3 mb-5 mt-n4" style="z-index: 10; margin-top: -30px;">
            <form th:action="@{/}" method="get" class="row g-2 align-items-center px-lg-4">
                <div class="col-md-3">
                    <select name="category" class="form-select border-0 bg-light rounded-pill px-4">
                        <option value="全部" th:selected="${selectedCategory == '全部'}">全部商品</option>
                        <option value="辣条" th:selected="${selectedCategory == '辣条'}">辣条</option>
                        <option value="坚果" th:selected="${selectedCategory == '坚果'}">坚果</option>
                        <option value="膨化食品" th:selected="${selectedCategory == '膨化食品'}">膨化食品</option>
                        <option value="饼干" th:selected="${selectedCategory == '饼干'}">饼干</option>
                        <option value="糖果" th:selected="${selectedCategory == '糖果'}">糖果</option>
                        <option value="饮料" th:selected="${selectedCategory == '饮料'}">饮料</option>
                        <option value="其他" th:selected="${selectedCategory == '其他'}">其他</option>
                    </select>
                </div>
                <div class="col-md-7">
                    <div class="input-group">
                        <span class="input-group-text border-0 bg-light rounded-start-pill ps-4"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" name="query" class="form-control border-0 bg-light rounded-end-pill pe-4" placeholder="搜索你心仪的零食..." th:value="${searchQuery}">
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm">立即搜索</button>
                </div>
            </form>
        </div>

        <div class="text-center mb-5">
            <h2 class="fw-bold" th:text="${(selectedCategory != '全部' ? selectedCategory : '热门推荐')}">热门推荐</h2>
            <div style="width: 50px; height: 3px; background-color: #FF6B6B; margin: 10px auto;"></div>
            <p th:if="${products.isEmpty()}" class="mt-4 text-muted">抱歉，没有找到匹配的商品。</p>
        </div>

        <div class="row g-4">
            <div class="col-md-6 col-lg-3" th:each="product : ${products}">
                <div class="card h-100">
                    <div style="height: 200px; overflow: hidden; position: relative;">
                         <img th:src="${product.imageUrl} ?: 'https://via.placeholder.com/300'" class="card-img-top w-100 h-100" style="object-fit: cover;" alt="商品图片">
                         <span class="badge bg-danger position-absolute top-0 end-0 m-3" th:if="${product.stock < 10}">库存紧张</span>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold" th:text="${product.name}">商品名称</h5>
                        <p class="card-text text-muted small flex-grow-1" th:text="${product.description}">描述</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <h4 class="text-danger mb-0 fw-bold" th:text="'￥' + ${product.price}">￥0.00</h4>
                            <a th:href="@{/product/{id}(id=${product.id})}" class="btn btn-outline-primary btn-sm rounded-pill">
                                <i class="fas fa-shopping-bag me-1"></i> 详情
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
