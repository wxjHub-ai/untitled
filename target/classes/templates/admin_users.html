<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/admin_layout :: layout(~{::title}, ~{::div})">
<head>
    <title>用户管理 - 管理后台</title>
</head>
<body>
<div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>用户管理</h2>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>邮箱</th>
                            <th>角色</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.username}">Username</td>
                            <td th:text="${user.email}">Email</td>
                            <td>
                                <form th:action="@{/admin/users/updateRole}" method="post" class="d-flex align-items-center">
                                    <input type="hidden" name="userId" th:value="${user.id}">
                                    <select name="role" class="form-select form-select-sm me-2" style="width: auto;">
                                        <option value="USER" th:selected="${user.role.name() == 'USER'}">普通用户</option>
                                        <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">管理员</option>
                                        <option value="MERCHANT" th:selected="${user.role.name() == 'MERCHANT'}">商家</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-outline-primary">更新</button>
                                </form>
                            </td>
                            <td>
                                <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" 
                                   class="btn btn-sm btn-outline-danger" 
                                   onclick="return confirm('确定要删除该用户吗？此操作不可撤销！')">
                                    <i class="fas fa-trash"></i> 删除
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
