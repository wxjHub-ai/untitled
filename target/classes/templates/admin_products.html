<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/admin_layout :: layout(~{::title}, ~{::div})">
<head>
    <title>商品管理 - 管理后台</title>
</head>
<body>
<div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>商品列表</h2>
        <div>
            <a href="/" target="_blank" class="btn btn-outline-secondary me-2"><i class="fas fa-home"></i> 返回商城首页</a>
            <a href="/admin/products/add" class="btn btn-success"><i class="fas fa-plus"></i> 添加商品</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>图片</th>
                    <th>名称</th>
                    <th>价格</th>
                    <th>库存</th>
                    <th>分类</th>
                    <th class="text-end pe-4">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td class="ps-4" th:text="${product.id}">1</td>
                    <td>
                        <img th:src="${product.imageUrl}" class="rounded" style="width: 40px; height: 40px; object-fit: cover;">
                    </td>
                    <td th:text="${product.name}">Name</td>
                    <td th:text="${product.price}">10.00</td>
                    <td>
                        <span th:class="${product.stock < 10 ? 'badge bg-danger' : 'badge bg-success'}" th:text="${product.stock}">100</span>
                    </td>
                    <td th:text="${product.category}">Category</td>
                    <td class="text-end pe-4">
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-primary me-2"><i class="fas fa-edit"></i></a>
                        <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定要删除这个商品吗？');"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
