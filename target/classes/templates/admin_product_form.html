<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/admin_layout :: layout(~{::title}, ~{::div})">
<head>
    <title>编辑商品 - 管理后台</title>
</head>
<body>
<div>
    <h2 class="mb-4">添加/编辑商品</h2>
    
    <!-- 显示错误信息 -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <span th:text="${errorMessage}">错误信息</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}" />
                <div class="row">
                    <div class="col-md-8">
                        <div class="mb-3">
                            <label class="form-label">商品名称</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">商品描述</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">价格</label>
                                <div class="input-group">
                                    <span class="input-group-text">￥</span>
                                    <input type="number" step="0.01" min="0" th:field="*{price}" class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">库存</label>
                                <input type="number" min="0" th:field="*{stock}" class="form-control" th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid' : ''" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                         <div class="mb-3">
                            <label class="form-label">分类</label>
                            <select th:field="*{category}" class="form-select">
                                <option value="辣条">辣条</option>
                                <option value="坚果">坚果</option>
                                <option value="膨化食品">膨化食品</option>
                                <option value="饼干">饼干</option>
                                <option value="糖果">糖果</option>
                                <option value="饮料">饮料</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">商品图片</label>
                            <input type="file" name="imageFile" class="form-control">
                            <p th:if="${product.imageUrl != null}">
                                当前图片: <img th:src="${product.imageUrl}" alt="Product Image" style="max-width: 100px; max-height: 100px;">
                            </p>
                        </div>
                        <div class="alert alert-info small">
                            <i class="fas fa-info-circle"></i> 请选择商品图片文件进行上传。
                        </div>
                    </div>
                </div>
                
                <hr>
                <div class="d-flex justify-content-end">
                    <a href="/admin/products" class="btn btn-secondary me-2">取消</a>
                    <button type="submit" class="btn btn-success px-4"><i class="fas fa-save me-1"></i> 保存商品</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
