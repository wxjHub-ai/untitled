<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title>注册 - 零食商城</title>
</head>
<body>
<section>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <h3 class="text-center fw-bold mb-4 text-primary">创建新账号</h3>
                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <div class="mb-3">
                                <label class="form-label text-muted">用户名</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user"></i></span>
                                    <input type="text" th:field="*{username}" class="form-control bg-light border-start-0" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted">邮箱</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope"></i></span>
                                    <input type="email" th:field="*{email}" class="form-control bg-light border-start-0" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">密码</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock"></i></span>
                                    <input type="password" th:field="*{password}" class="form-control bg-light border-start-0" required>
                                </div>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">立即注册</button>
                            </div>
                        </form>
                        <div class="text-center mt-4">
                            <p class="text-muted">已有账号? <a href="/login" class="fw-bold text-decoration-none">去登录</a></p>
                            <a href="/" class="btn btn-link text-muted mt-2"><i class="fas fa-arrow-left"></i> 返回首页</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
