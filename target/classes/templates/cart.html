<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title>购物车 - 集食行乐</title>
</head>
<body>
<section>
    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0"><i class="fas fa-shopping-cart text-primary me-2"></i> 购物车</h2>
            <a href="/" class="btn btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-1"></i> 继续购物</a>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${param.error}">Error message</span>
        </div>

        <div th:if="${cartItems.empty}" class="text-center py-5 bg-white rounded shadow-sm">
            <i class="fas fa-shopping-basket text-muted mb-3" style="font-size: 4rem;"></i>
            <h4 class="text-muted">购物车是空的</h4>
            <a href="/" class="btn btn-primary mt-3">去逛逛</a>
        </div>

        <div th:unless="${cartItems.empty}" class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                <tr>
                                    <th scope="col" class="ps-4">商品</th>
                                    <th scope="col" class="text-center">单价</th>
                                    <th scope="col" class="text-center">数量</th>
                                    <th scope="col" class="text-center">小计</th>
                                    <th scope="col" class="text-end pe-4">操作</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="item : ${cartItems}">
                                    <td class="ps-4">
                                        <div class="d-flex align-items-center">
                                            <img th:src="${item.product.imageUrl}" class="rounded me-3" style="width: 50px; height: 50px; object-fit: cover;" alt="">
                                            <span class="fw-bold" th:text="${item.product.name}">Product</span>
                                        </div>
                                    </td>
                                    <td class="text-center" th:text="'￥' + ${item.product.price}">￥0.00</td>
                                    <td class="text-center">
                                        <div class="d-flex align-items-center justify-content-center">
                                            <a th:href="@{/cart/decrement/{id}(id=${item.product.id})}" class="btn btn-sm btn-outline-secondary px-2 py-0">
                                                <i class="fas fa-minus small"></i>
                                            </a>
                                            <span class="mx-3 fw-bold" th:text="${item.quantity}">1</span>
                                            <a th:href="@{/cart/increment/{id}(id=${item.product.id})}" class="btn btn-sm btn-outline-secondary px-2 py-0">
                                                <i class="fas fa-plus small"></i>
                                            </a>
                                        </div>
                                    </td>
                                    <td class="text-center fw-bold text-danger" th:text="'￥' + ${item.totalPrice}">￥0.00</td>
                                    <td class="text-end pe-4">
                                        <a th:href="@{/cart/remove/{id}(id=${item.product.id})}" class="text-danger" title="删除">
                                            <i class="fas fa-trash-alt"></i>
                                        </a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-4">订单摘要</h5>
                        <div class="d-flex justify-content-between mb-3">
                            <span>商品总数</span>
                            <span class="fw-bold" th:text="${cartItems.size()}">0</span>
                        </div>
                        <hr>
                        
                        <!-- 地址选择 -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">收货地址</label>
                            <div th:if="${not #lists.isEmpty(addresses)}">
                                <div class="form-check mb-2" th:each="addr : ${addresses}">
                                    <input class="form-check-input" type="radio" name="selectedAddr" th:id="'addr'+${addr.id}" th:value="${addr.id}" th:checked="${addr.default}">
                                    <label class="form-check-label small" th:for="'addr'+${addr.id}">
                                        <span class="badge bg-secondary me-1" th:text="${addr.label}">家</span>
                                        <span th:text="${addr.receiverName} + ' ' + ${addr.receiverPhone}"></span><br>
                                        <span class="text-muted" th:text="${addr.getFullAddress()}"></span>
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="selectedAddr" id="addrNew" value="new">
                                    <label class="form-check-label small" for="addrNew">使用新地址</label>
                                </div>
                            </div>
                            
                            <div id="newAddressSection" th:style="${#lists.isEmpty(addresses) ? 'display:block' : 'display:none'}" class="mt-3">
                                <div class="row g-2 mb-2" data-toggle="distpicker">
                                    <div class="col-4">
                                        <select class="form-select form-select-sm" id="newProvince" name="newProvince"></select>
                                    </div>
                                    <div class="col-4">
                                        <select class="form-select form-select-sm" id="newCity" name="newCity"></select>
                                    </div>
                                    <div class="col-4">
                                        <select class="form-select form-select-sm" id="newDistrict" name="newDistrict"></select>
                                    </div>
                                </div>
                                <textarea class="form-control rounded shadow-sm" id="deliveryAddress" name="deliveryAddress" rows="2" placeholder="请输入详细收货地址 (街道、楼牌号等)"></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mb-4">
                            <span class="h5 mb-0">总计</span>
                            <span class="h4 text-danger fw-bold mb-0" th:text="'￥' + ${totalAmount}">￥0.00</span>
                        </div>
                        
                        <form th:action="@{/cart/checkout}" method="post" id="checkoutForm">
                            <input type="hidden" name="addressId" id="hiddenAddressId">
                            <input type="hidden" name="deliveryAddress" id="hiddenDeliveryAddress">
                            <button type="submit" onclick="return prepareCheckout()" class="btn btn-primary w-100 py-2 rounded-pill fw-bold shadow">
                                <i class="fas fa-check-circle me-2"></i> 立即结算
                            </button>
                        </form>
                        
                        <script>
                            function prepareCheckout() {
                                const radios = document.getElementsByName('selectedAddr');
                                let selectedId = null;
                                let isNew = true;
                                
                                if (radios.length > 0) {
                                    for (const r of radios) {
                                        if (r.checked) {
                                            if (r.value !== 'new') {
                                                selectedId = r.value;
                                                isNew = false;
                                            }
                                            break;
                                        }
                                    }
                                }
                                
                                if (isNew) {
                                    const province = document.getElementById('newProvince').value;
                                    const city = document.getElementById('newCity').value;
                                    const district = document.getElementById('newDistrict').value;
                                    const detail = document.getElementById('deliveryAddress').value;

                                    if (!province || province === '' || province.includes('——')) {
                                        alert('请选择省份！');
                                        return false;
                                    }
                                    if (!city || city === '' || city.includes('——')) {
                                        alert('请选择城市！');
                                        return false;
                                    }
                                    if (!detail || detail.trim() === '') {
                                        alert('请填写详细收货地址！');
                                        return false;
                                    }

                                    // Combine address
                                    const cleanDistrict = (district && !district.includes('——')) ? district : '';
                                    const fullAddr = province + city + cleanDistrict + detail;
                                    document.getElementById('hiddenDeliveryAddress').value = fullAddr;
                                    document.getElementById('hiddenAddressId').value = '';
                                } else {
                                    document.getElementById('hiddenAddressId').value = selectedId;
                                    document.getElementById('hiddenDeliveryAddress').value = '';
                                }
                                return true;
                            }
                            
                            // Toggle section based on radio
                            document.addEventListener('change', function(e) {
                                if (e.target.name === 'selectedAddr') {
                                    const section = document.getElementById('newAddressSection');
                                    section.style.display = e.target.value === 'new' ? 'block' : 'none';
                                }
                            });
                        </script>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
