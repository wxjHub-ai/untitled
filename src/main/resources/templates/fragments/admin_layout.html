<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">后台管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            background-color: #2D3436;
            color: #fff;
            padding-top: 20px;
        }
        .sidebar a {
            color: #b2bec3;
            text-decoration: none;
            padding: 15px 25px;
            display: block;
            transition: 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: #fff;
            background-color: #FF6B6B;
        }
        .content {
            margin-left: 250px;
            padding: 20px;
        }
        .card-stat {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 class="text-center mb-4"><i class="fas fa-cookie-bite text-danger"></i> 集食行乐</h3>
    <a href="/admin">
        <i class="fas fa-tachometer-alt me-2"></i> 仪表盘
    </a>
    <a href="/admin/products">
        <i class="fas fa-box me-2"></i> 商品管理
    </a>
    <a href="/admin/orders">
        <i class="fas fa-shopping-cart me-2"></i> 订单管理
    </a>
    <a href="/admin/users" sec:authorize="hasRole('ADMIN')">
        <i class="fas fa-users me-2"></i> 用户管理
    </a>
    <a href="/" target="_blank">
        <i class="fas fa-home me-2"></i> 返回商城首页
    </a>
    <div class="mt-5 px-3">
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light w-100 btn-sm" type="submit">退出登录</button>
        </form>
    </div>
</div>

<div class="content">
    <div th:replace="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 自动隐藏提示框 (3秒后)
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert-dismissible');
            alerts.forEach(function(alert) {
                const bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 3000);
    });
</script>
</body>
</html>
