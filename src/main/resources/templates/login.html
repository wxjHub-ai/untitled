<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title>登录 - 集食行乐</title>
</head>
<body>
<section>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <h3 class="text-center fw-bold mb-4 text-primary">欢迎回来</h3>

                        <!-- 登录错误提示 -->
                        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i> 用户名或密码错误，请重试！
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <!-- 退出成功提示 -->
                        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle me-2"></i> 您已成功退出登录。
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label text-muted">用户名</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user"></i></span>
                                    <input type="text" name="username" class="form-control bg-light border-start-0" placeholder="请输入用户名" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">密码</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock"></i></span>
                                    <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="请输入密码" required>
                                </div>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">立即登录</button>
                            </div>
                        </form>
                        <div class="text-center mt-4">
                            <p class="text-muted">还没有账号? <a href="/register" class="fw-bold text-decoration-none">立即注册</a></p>
                            <a href="/" class="btn btn-link text-muted mt-2"><i class="fas fa-arrow-left"></i> 返回首页</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
