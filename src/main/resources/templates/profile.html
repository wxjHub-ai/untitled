<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::div})">
<head>
    <title>个人信息 - 集食行乐</title>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h3 class="card-title fw-bold mb-4 text-center">
                        <i class="fas fa-user-edit text-primary me-2"></i> 修改个人信息
                    </h3>

                    <!-- Success Message -->
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Error Message -->
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/profile/update}" method="post" th:object="${user}">
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold text-uppercase">用户名</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" class="form-control bg-light border-0" th:field="*{username}" readonly>
                            </div>
                            <div class="form-text">用户名不可修改</div>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label text-muted small fw-bold text-uppercase">电子邮箱</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" id="email" class="form-control border-0 bg-light" th:field="*{email}" placeholder="请输入您的邮箱" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="newPassword" class="form-label text-muted small fw-bold text-uppercase">新密码 (留空则不修改)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" id="newPassword" name="newPassword" class="form-control border-0 bg-light" placeholder="请输入新密码">
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm py-3 fw-bold">
                                <i class="fas fa-save me-2"></i> 保存修改
                            </button>
                            <a href="/" class="btn btn-link text-muted text-decoration-none">返回首页</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
