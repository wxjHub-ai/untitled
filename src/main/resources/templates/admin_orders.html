<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/admin_layout :: layout(~{::title}, ~{::div})">
<head>
    <title>订单管理 - 管理后台</title>
</head>
<body>
<div>
    <h2 class="mb-4">订单管理</h2>

    <!-- 筛选功能 -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form th:action="@{/admin/orders}" method="get" class="row g-3 align-items-end">
                <div class="col-md-2">
                    <label class="form-label small fw-bold">订单状态</label>
                    <select name="status" class="form-select">
                        <option value="全部">全部状态</option>
                        <option value="已支付" th:selected="${status == '已支付'}">已支付</option>
                        <option value="已发货" th:selected="${status == '已发货'}">已发货</option>
                        <option value="已送达" th:selected="${status == '已送达'}">已送达</option>
                        <option value="已完成" th:selected="${status == '已完成'}">已完成</option>
                        <option value="已取消" th:selected="${status == '已取消'}">已取消</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold">下单用户</label>
                    <input type="text" name="username" class="form-control" th:value="${username}" placeholder="输入用户名...">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">起始日期</label>
                    <input type="date" name="startDate" class="form-control" th:value="${startDate}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">截止日期</label>
                    <input type="date" name="endDate" class="form-control" th:value="${endDate}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-filter me-1"></i> 筛选
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 消息提示 -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>订单 ID</th>
                            <th>下单用户</th>
                            <th>下单日期</th>
                            <th>总金额</th>
                            <th>当前状态</th>
                            <th>更新状态</th>
                            <th>详情</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.id}">#1</td>
                            <td th:text="${order.user.username}">User</td>
                            <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                            <td class="text-danger fw-bold" th:text="'￥' + ${order.totalAmount}">￥0.00</td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${order.status == '已支付' ? 'bg-success' : 
                                                       (order.status == '已发货' ? 'bg-warning text-dark' : 
                                                       (order.status == '已取消' ? 'bg-danger' : 
                                                       (order.status == '已完成' ? 'bg-dark' : 'bg-primary')))}"
                                      th:text="${order.status}">Status</span>
                            </td>
                            <td>
                                <form th:action="@{/admin/orders/updateStatus}" method="post" class="d-flex align-items-center">
                                    <input type="hidden" name="orderId" th:value="${order.id}">
                                    <select name="status" class="form-select form-select-sm me-2" style="width: auto;">
                                        <option value="已支付" th:selected="${order.status == '已支付'}">已支付</option>
                                        <option value="已发货" th:selected="${order.status == '已发货'}">已发货</option>
                                        <option value="已送达" th:selected="${order.status == '已送达'}">已送达</option>
                                        <option value="已完成" th:selected="${order.status == '已完成'}">已完成</option>
                                        <option value="已取消" th:selected="${order.status == '已取消'}">已取消</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-primary">更新</button>
                                </form>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-outline-info" type="button" 
                                        data-bs-toggle="collapse" th:attr="data-bs-target='#orderDetails' + ${order.id}">
                                    查看明细
                                </button>
                            </td>
                            <td>
                                <a th:if="${order.status == '已取消'}" th:href="@{/admin/orders/delete/{id}(id=${order.id})}" 
                                   class="btn btn-sm btn-danger" onclick="return confirm('确定要删除这个已取消的订单吗？')">
                                    <i class="fas fa-trash"></i> 删除
                                </a>
                            </td>
                        </tr>
                        <!-- Order Items Detail Row -->
                        <tr th:each="order : ${orders}" class="collapse" th:id="'orderDetails' + ${order.id}">
                            <td colspan="8" class="bg-light p-4">
                                <div class="row">
                                    <div class="col-md-8">
                                        <h5>商品清单</h5>
                                        <table class="table table-sm table-bordered bg-white">
                                            <thead>
                                                <tr>
                                                    <th>商品名称</th>
                                                    <th>价格</th>
                                                    <th>数量</th>
                                                    <th>小计</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="item : ${order.items}">
                                                    <td th:text="${item.product.name}">Product</td>
                                                    <td th:text="'￥' + ${item.price}">￥0.00</td>
                                                    <td th:text="${item.quantity}">0</td>
                                                    <td th:text="'￥' + ${item.price * item.quantity}">￥0.00</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="col-md-4">
                                        <h5>用户信息</h5>
                                        <p class="mb-1"><strong>用户名:</strong> <span th:text="${order.user.username}"></span></p>
                                        <p class="mb-1"><strong>联系邮箱:</strong> <span th:text="${order.user.email}"></span></p>
                                        <hr>
                                        <h5>收货信息</h5>
                                        <p class="mb-0 text-primary fw-bold"><strong>收货地址:</strong></p>
                                        <p th:text="${order.deliveryAddress}" class="bg-white p-2 rounded border">地址</p>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
