<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title>商品详情 - 集食行乐</title>
</head>
<body>
<section>
    <div class="container mt-5 mb-5" th:if="${product}">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/" class="text-decoration-none">首页</a></li>
                <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Product</li>
            </ol>
        </nav>

        <div class="card shadow-sm p-4 mt-4">
            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${param.error}">库存不足，无法添加！</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row">
                <div class="col-md-6 mb-4 mb-md-0">
                    <div class="bg-light rounded d-flex align-items-center justify-content-center" style="height: 400px; overflow: hidden;">
                        <img th:src="${product.imageUrl} ?: 'https://via.placeholder.com/500'" class="img-fluid" style="max-height: 100%;" alt="商品图片">
                    </div>
                </div>
                <div class="col-md-6">
                    <h1 class="fw-bold mb-3" th:text="${product.name}">商品名称</h1>
                    <div class="mb-3">
                        <span class="badge bg-success me-2" th:text="${product.category}">分类</span>
                        <span th:class="${product.stock == 0 ? 'badge bg-secondary' : (product.stock < 10 ? 'badge bg-danger' : 'text-muted')}" th:text="${product.stock == 0 ? '已售罄' : '库存: ' + product.stock}">库存: 0</span>
                    </div>
                    <h2 class="text-danger fw-bold mb-4" th:text="'￥' + ${product.price}">￥0.00</h2>
                    <p class="text-muted mb-4" style="line-height: 1.8;" th:text="${product.description}">商品描述</p>
                    
                    <form th:action="@{/cart/add}" method="post" th:if="${product.stock > 0}">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <div class="row g-3 align-items-center mb-4">
                            <div class="col-auto">
                                <label class="col-form-label fw-bold">数量</label>
                            </div>
                            <div class="col-auto">
                                <input type="number" name="quantity" class="form-control text-center" value="1" min="1" th:max="${product.stock}" style="width: 80px;">
                            </div>
                        </div>
                        <div class="d-grid gap-2 d-md-block">
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow">
                                <i class="fas fa-cart-plus me-2"></i> 加入购物车
                            </button>
                        </div>
                    </form>
                    
                    <div th:unless="${product.stock > 0}" class="d-grid gap-2 d-md-block mt-4">
                        <button class="btn btn-secondary btn-lg px-5 shadow" disabled>
                            <i class="fas fa-times-circle me-2"></i> 已售罄
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container mt-5" th:unless="${product}">
        <div class="alert alert-warning text-center">
            <h3>未找到该商品</h3>
            <a href="/" class="btn btn-primary mt-3">返回首页</a>
        </div>
    </div>
</section>
</body>
</html>
