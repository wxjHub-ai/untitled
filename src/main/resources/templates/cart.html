<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title>购物车 - 零食商城</title>
</head>
<body>
<section>
    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0"><i class="fas fa-shopping-cart text-primary me-2"></i> 购物车</h2>
            <a href="/" class="btn btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-1"></i> 继续购物</a>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${param.error}">Error message</span>
        </div>

        <div th:if="${cart.items.empty}" class="text-center py-5 bg-white rounded shadow-sm">
            <i class="fas fa-shopping-basket text-muted mb-3" style="font-size: 4rem;"></i>
            <h4 class="text-muted">购物车是空的</h4>
            <a href="/" class="btn btn-primary mt-3">去逛逛</a>
        </div>

        <div th:unless="${cart.items.empty}" class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                <tr>
                                    <th scope="col" class="ps-4">商品</th>
                                    <th scope="col" class="text-center">单价</th>
                                    <th scope="col" class="text-center">数量</th>
                                    <th scope="col" class="text-center">小计</th>
                                    <th scope="col" class="text-end pe-4">操作</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="item : ${cart.items}">
                                    <td class="ps-4">
                                        <div class="d-flex align-items-center">
                                            <img th:src="${item.product.imageUrl}" class="rounded me-3" style="width: 50px; height: 50px; object-fit: cover;" alt="">
                                            <span class="fw-bold" th:text="${item.product.name}">Product</span>
                                        </div>
                                    </td>
                                    <td class="text-center" th:text="'￥' + ${item.product.price}">￥0.00</td>
                                    <td class="text-center" th:text="${item.quantity}">1</td>
                                    <td class="text-center fw-bold text-danger" th:text="'￥' + ${item.totalPrice}">￥0.00</td>
                                    <td class="text-end pe-4">
                                        <a th:href="@{/cart/remove/{id}(id=${item.product.id})}" class="text-danger" title="删除">
                                            <i class="fas fa-trash-alt"></i>
                                        </a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-4">订单摘要</h5>
                        <div class="d-flex justify-content-between mb-3">
                            <span>商品总数</span>
                            <span class="fw-bold" th:text="${cart.items.size()}">0</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="h5 mb-0">总计</span>
                            <span class="h4 text-danger fw-bold mb-0" th:text="'￥' + ${totalAmount}">￥0.00</span>
                        </div>
                        
                        <form th:action="@{/cart/checkout}" method="post">
                            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold shadow">
                                <i class="fas fa-check-circle me-2"></i> 立即结算
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
