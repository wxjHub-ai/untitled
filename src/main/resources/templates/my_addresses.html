<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title>地址管理 - 集食行乐</title>
</head>
<body>
<section>
    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0"><i class="fas fa-map-marker-alt text-primary me-2"></i> 地址管理</h2>
            <button class="btn btn-primary rounded-pill" data-bs-toggle="modal" data-bs-target="#addAddressModal">
                <i class="fas fa-plus me-1"></i> 新增地址
            </button>
        </div>

        <div class="row g-4">
            <div class="col-md-6" th:each="addr : ${addresses}">
                <div class="card shadow-sm border-0 position-relative">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="badge bg-info" th:text="${addr.label}">家</span>
                            <span th:if="${addr.default}" class="badge bg-success">默认地址</span>
                        </div>
                        <h5 class="fw-bold" th:text="${addr.receiverName}">收货人</h5>
                        <p class="text-muted mb-1" th:text="${addr.receiverPhone}">手机号</p>
                        <p class="mb-3" th:text="${addr.getFullAddress()}">详细地址</p>
                        <div class="d-flex justify-content-end">
                            <a th:href="@{/addresses/delete/{id}(id=${addr.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定删除该地址吗？')">
                                <i class="fas fa-trash-alt"></i> 删除
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Address Modal -->
        <div class="modal fade" id="addAddressModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/addresses/save}" th:object="${newAddress}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">新增收货地址</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">收货人姓名</label>
                                <input type="text" th:field="*{receiverName}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号码</label>
                                <input type="text" th:field="*{receiverPhone}" class="form-control" required>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">省份</label>
                                    <input type="text" th:field="*{province}" class="form-control" placeholder="如：广东省">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">城市</label>
                                    <input type="text" th:field="*{city}" class="form-control" placeholder="如：深圳市">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">区/县</label>
                                    <input type="text" th:field="*{district}" class="form-control" placeholder="如：南山区">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">详细地址</label>
                                <textarea th:field="*{detailAddress}" class="form-control" rows="2" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">地址标签</label>
                                <select th:field="*{label}" class="form-select">
                                    <option value="家">家</option>
                                    <option value="公司">公司</option>
                                    <option value="学校">学校</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{default}" id="isDefault">
                                <label class="form-check-label" for="isDefault">设为默认地址</label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                            <button type="submit" class="btn btn-primary">保存地址</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
