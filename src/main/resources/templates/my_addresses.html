<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="fragments/layout :: layout(~{::title}, ~{::section})">
<head>
    <title>地址管理 - 集食行乐</title>
</head>
<body>
<section>
    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0"><i class="fas fa-map-marker-alt text-primary me-2"></i> 地址管理</h2>
            <button class="btn btn-primary rounded-pill" data-bs-toggle="modal" data-bs-target="#addAddressModal" onclick="resetForm()">
                <i class="fas fa-plus me-1"></i> 新增地址
            </button>
        </div>

        <div class="row g-4">
            <div class="col-md-6" th:each="addr : ${addresses}">
                <div class="card shadow-sm border-0 position-relative">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="badge bg-info" th:text="${addr.label}">家</span>
                            <span th:if="${addr.default}" class="badge bg-success">默认地址</span>
                        </div>
                        <h5 class="fw-bold" th:text="${addr.receiverName}">收货人</h5>
                        <p class="text-muted mb-1" th:text="${addr.receiverPhone}">手机号</p>
                        <p class="mb-3" th:text="${addr.getFullAddress()}">详细地址</p>
                        <div class="d-flex justify-content-end">
                            <button class="btn btn-sm btn-outline-primary me-2" th:onclick="'editAddress(' + ${addr.id} + ')'">
                                <i class="fas fa-edit"></i> 编辑
                            </button>
                            <a th:href="@{/addresses/delete/{id}(id=${addr.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定删除该地址吗？')">
                                <i class="fas fa-trash-alt"></i> 删除
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add/Edit Address Modal -->
        <div class="modal fade" id="addAddressModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/addresses/save}" th:object="${newAddress}" method="post" id="addressForm">
                        <div class="modal-header">
                            <h5 class="modal-title" id="modalTitle">新增收货地址</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="resetForm()"></button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="id" id="addressId">
                            <div class="mb-3">
                                <label class="form-label text-primary small fw-bold">收货人姓名 *</label>
                                <input type="text" name="receiverName" id="receiverName" class="form-control rounded-pill shadow-sm" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-primary small fw-bold">手机号码 *</label>
                                <input type="text" name="receiverPhone" id="receiverPhone" class="form-control rounded-pill shadow-sm" required>
                            </div>
                            <div class="row" id="distpicker">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label text-primary small fw-bold">省份 *</label>
                                    <select name="province" id="province" class="form-select rounded-pill shadow-sm" required></select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label text-primary small fw-bold">城市 *</label>
                                    <select name="city" id="city" class="form-select rounded-pill shadow-sm" required></select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label text-primary small fw-bold">区/县</label>
                                    <select name="district" id="district" class="form-select rounded-pill shadow-sm"></select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-primary small fw-bold">详细地址 *</label>
                                <textarea name="detailAddress" id="detailAddress" class="form-control shadow-sm" rows="2" required style="border-radius: 15px;"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-primary small fw-bold">地址标签</label>
                                <select name="label" id="label" class="form-select rounded-pill shadow-sm">
                                    <option value="家">家</option>
                                    <option value="公司">公司</option>
                                    <option value="学校">学校</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="default" id="isDefault">
                                <label class="form-check-label" for="isDefault">设为默认地址</label>
                            </div>
                        </div>
                        <div class="modal-footer border-0">
                            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal" onclick="resetForm()">取消</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">保存地址</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Move scripts INSIDE the section so they are included by Thymeleaf -->
    <script th:inline="javascript">
        $(function() {
            // Initialize distpicker
            $('#distpicker').distpicker({
                autoSelect: true
            });
        });

        function resetForm() {
            console.log('Resetting form...');
            $('#modalTitle').text('新增收货地址');
            $('#addressId').val('');
            $('#addressForm')[0].reset();
            
            // Correct way to reset distpicker
            $('#distpicker').distpicker('destroy');
            $('#distpicker').distpicker({
                autoSelect: true
            });
            
            $('#isDefault').prop('checked', false);
        }

        window.editAddress = function(id) {
            console.log('Editing address:', id);
            $.ajax({
                url: '/addresses/' + id,
                type: 'GET',
                success: function(address) {
                    if (address) {
                        $('#modalTitle').text('编辑收货地址');
                        $('#addressId').val(address.id);
                        $('#receiverName').val(address.receiverName);
                        $('#receiverPhone').val(address.receiverPhone);
                        
                        // Update distpicker with specific values
                        $('#distpicker').distpicker('destroy');
                        $('#distpicker').distpicker({
                            province: address.province,
                            city: address.city,
                            district: address.district
                        });

                        $('#detailAddress').val(address.detailAddress);
                        $('#label').val(address.label);
                        
                        var isDefaultValue = address['default'] !== undefined ? address['default'] : address.isDefault;
                        $('#isDefault').prop('checked', isDefaultValue);
                        
                        var modalElement = document.getElementById('addAddressModal');
                        var modal = bootstrap.Modal.getOrCreateInstance(modalElement);
                        modal.show();
                    } else {
                        alert('未找到该地址信息');
                    }
                },
                error: function() {
                    alert('获取地址信息失败，请稍后重试');
                }
            });
        };
    </script>
</section>
</body>
</html>
